name: Update Bing Ad Customizer

on:
  schedule:
    - cron: '0 6 1 * *'  # Runs on the 1st of every month at 6am UTC
  workflow_dispatch:      # Allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update CSV with current month
        run: |
          MONTH=$(date +"%B %Y")
          printf "Attribute,Data type,Account value,Campaign,Ad group,Keyword\nyear month,Text,$MONTH,,,\n" > customizer.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add customizer.csv
          git diff --staged --quiet || git commit -m "Update customizer to $(date +'%B %Y')"
          git push
